name: AI Startup Factory Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  run-agents:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt


      - name: Verify sentence-transformers
        run: |
          pip list | grep sentence


      # ---------------------------------------
      # 1 TREND SCANNER
      # ---------------------------------------

      - name: Run Trend Scanner
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Running Trend Scanner"
          python agents/trend_scanner/scanner.py


      # ---------------------------------------
      # 2 PROBLEM EXTRACTION
      # ---------------------------------------

      - name: Run Problem Extraction Agent
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          echo "Running Problem Extraction"
          python agents/problem_extractor/extractor.py


      # ---------------------------------------
      # 3 IDEA WRITER
      # ---------------------------------------

      - name: Run Idea Writer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          echo "Running Idea Writer"
          python agents/idea_writer/writer.py


      # ---------------------------------------
      # 4 EMBEDDING AGENT
      # ---------------------------------------

      - name: Run Embedding Agent
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Generating embeddings"
          python agents/embedding_agent/embedding_agent.py


      # ---------------------------------------
      # 5 CLUSTERING
      # ---------------------------------------

      - name: Run Idea Clustering
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Running clustering"
          python agents/idea_clusterer/clusterer.py


      # ---------------------------------------
      # 6 OPPORTUNITY GAP DETECTOR
      # ---------------------------------------

      - name: Run Opportunity Gap Detector
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Detecting opportunity gaps"
          python agents/opportunity_gap_detector/gap_detector.py


      # ---------------------------------------
      # 7 MARKET ANALYZER
      # ---------------------------------------

      - name: Run Market Analyzer
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Running market analysis"
          python agents/market_analyzer/analyzer.py


      # ---------------------------------------
      # 8 TREND MOMENTUM
      # ---------------------------------------

      - name: Run Trend Momentum Analyzer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Analyzing trend momentum"
          python agents/trend_momentum/momentum.py


      # ---------------------------------------
      # 9 OPPORTUNITY RANKER
      # ---------------------------------------

      - name: Run Opportunity Ranker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Ranking startup opportunities"
          python agents/opportunity_ranker/ranker.py
