name: AI Startup Factory Production Pipeline

on:
  workflow_dispatch: # Memungkinkan eksekusi manual dari dashboard GitHub
  schedule:
    # Berjalan setiap 6 jam (4 kali sehari)
    - cron: "0 */6 * * *"

jobs:
  factory-production:
    runs-on: ubuntu-latest
    
    # Global Environment: Menggunakan Secrets untuk keamanan
    env:
      PYTHONPATH: ${{ github.workspace }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      AI_STARTUP_TOKEN: ${{ secrets.AI_STARTUP_TOKEN }}

    steps:
      # -------------------------------------------------
      # PREPARATION
      # -------------------------------------------------
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -------------------------------------------------
      # STAGE 1: INGESTION (Trend Scanning)
      # -------------------------------------------------
      - name: Run Trend Scanner (Multi-Source)
        # Scanner secara otomatis memuat plugin dari agents/data_sources/
        run: python -m agents.trend_scanner.scanner
        continue-on-error: true

      # -------------------------------------------------
      # STAGE 2: PROCESSING (Idea & Extraction)
      # -------------------------------------------------
      - name: Core Idea Processing
        run: |
          python -m agents.idea_generator.generator
          python -m agents.problem_extractor.extractor

      # -------------------------------------------------
      # STAGE 3: INTELLIGENCE (Vectors & Quality)
      # -------------------------------------------------
      - name: Vector Intelligence & Deduplication
        run: |
          python -m agents.embedding_agent.embedding_agent
          python -m agents.semantic_deduplicator.semantic_deduplicator

      # -------------------------------------------------
      # STAGE 4: CLUSTERING & ANALYSIS
      # -------------------------------------------------
      - name: Market Analysis & Discovery
        run: |
          python -m agents.idea_clusterer.clusterer
          python -m agents.market_analyzer.analyzer
          python -m agents.opportunity_discovery.vector_discovery

      # -------------------------------------------------
      # STAGE 5: EVALUATION (Scoring & Gaps)
      # -------------------------------------------------
      - name: Opportunity Evaluation
        run: |
          python -m agents.opportunity_gap_detector.gap_detector
          python -m agents.opportunity_scorer.scorer
          python -m agents.opportunity_ranker.ranker

      # -------------------------------------------------
      # STAGE 6: FINAL PRODUCTION (Blueprints & Web)
      # -------------------------------------------------
      - name: Generate Startup Blueprints
        run: python -m agents.startup_generator.startup_blueprint_generator

      - name: External Momentum Validation
        run: python -m agents.trend_momentum.momentum

      - name: Build Web Assets (Landing Pages)
        # Tahap terakhir: Membuat aset visual yang bisa dipamerkan
        run: python -m agents.web_generator.landing_page_gen

      # -------------------------------------------------
      # DEPLOYMENT (Optional: Deploy to GitHub Pages)
      # -------------------------------------------------
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: landing-pages
          path: dist/
          retention-days: 7

      - name: Deployment Success
        run: echo "🚀 Pipeline completed. New startup opportunities generated and ranked."
