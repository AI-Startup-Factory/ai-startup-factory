name: AI Startup Factory Pipeline

on:

  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"

jobs:

  ai-startup-pipeline:

    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      AI_STARTUP_TOKEN: ${{ secrets.AI_STARTUP_TOKEN }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Install dependencies
        run: |
          pip install -r requirements.txt


      ################################################
      # DATA SOURCE INGESTION
      ################################################

      - name: Collect HackerNews signals
        run: python agents/data_sources/hackernews.py

      - name: Collect Reddit ML signals
        run: python agents/data_sources/reddit_ml.py

      - name: Collect Reddit SaaS signals
        run: python agents/data_sources/reddit_saas.py

      - name: Collect Reddit Startup signals
        run: python agents/data_sources/reddit_startups.py

      - name: Collect GitHub Trending
        run: python agents/data_sources/github_trending.py

      - name: Collect GitHub Issues
        run: python agents/data_sources/github_issues.py

      - name: Collect ProductHunt signals
        run: python agents/data_sources/producthunt.py

      - name: Collect StackOverflow signals
        run: python agents/data_sources/stackoverflow.py

      - name: Collect TechCrunch signals
        run: python agents/data_sources/techcrunch.py

      - name: Collect Dev.to signals
        run: python agents/data_sources/devto.py

      - name: Collect IndieHackers signals
        run: python agents/data_sources/indiehackers.py

      - name: Collect YC Requests
        run: python agents/data_sources/yc_requests.py

      - name: Collect ArXiv AI signals
        run: python agents/data_sources/arxiv_ai.py

      - name: Collect ArXiv ML signals
        run: python agents/data_sources/arxiv_ml.py


      ################################################
      # TREND SIGNAL PROCESSING
      ################################################

      - name: Run Trend Scanner
        run: python trend_scanner/scanner.py


      ################################################
      # PROBLEM EXTRACTION
      ################################################

      - name: Extract Problems
        run: python problem_extractor/extractor.py


      ################################################
      # EMBEDDING
      ################################################

      - name: Generate Embeddings
        run: python embedding_agent/embedding_agent.py


      ################################################
      # CLUSTER PROBLEMS
      ################################################

      - name: Cluster Problems
        run: python idea_clusterer/clusterer.py


      ################################################
      # GENERATE IDEAS
      ################################################

      - name: Generate Startup Ideas
        run: python idea_generator/generator.py


      ################################################
      # WRITE FULL IDEA
      ################################################

      - name: Write Startup Concepts
        run: python idea_writer/writer.py


      ################################################
      # MARKET ANALYSIS
      ################################################

      - name: Analyze Market
        run: python market_analyzer/analyzer.py


      ################################################
      # TREND MOMENTUM
      ################################################

      - name: Calculate Trend Momentum
        run: python trend_momentum/momentum.py


      ################################################
      # GAP DETECTION
      ################################################

      - name: Detect Opportunity Gaps
        run: python opportunity_gap_detector/gap_detector.py


      ################################################
      # RANK OPPORTUNITIES
      ################################################

      - name: Rank Opportunities
        run: python opportunity_ranker/ranker.py
