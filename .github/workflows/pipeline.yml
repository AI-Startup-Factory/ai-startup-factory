name: AI Startup Factory Pipeline

on:
  workflow_dispatch:
  schedule:
    # Berjalan setiap 6 jam untuk menjaga aliran data startup
    - cron: "0 */6 * * *"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    # Global Environment: Efisiensi agar tidak menulis env di setiap step
    env:
      PYTHONPATH: ${{ github.workspace }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      AI_STARTUP_TOKEN: ${{ secrets.AI_STARTUP_TOKEN }}

    steps:
      # =========================
      # PREPARATION
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip' # Mempercepat run berikutnya

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # =========================
      # DATA COLLECTION (Signals)
      # =========================
      - name: Run Data Source Agents
        run: |
          python -m agents.data_sources.reddit_startups
          python -m agents.data_sources.reddit_ml
          python -m agents.data_sources.reddit_saas
          python -m agents.data_sources.github_trending
          python -m agents.data_sources.github_issues
          python -m agents.data_sources.hackernews
          python -m agents.data_sources.techcrunch
          python -m agents.data_sources.producthunt
          python -m agents.data_sources.devto
          python -m agents.data_sources.arxiv_ai
          python -m agents.data_sources.arxiv_ml
          python -m agents.data_sources.stackoverflow
          python -m agents.data_sources.yc_requests

      - name: Run Trend Scanner
        run: python -m agents.trend_scanner.scanner

      # =========================
      # IDEA PROCESSING (The Core)
      # =========================
      - name: Generate Startup Ideas
        run: python -m agents.idea_generator.generator

      - name: Extract & Enrich Problems
        run: python -m agents.problem_extractor.extractor

      # =========================
      # VECTOR INTELLIGENCE (Crucial Fix)
      # =========================
      - name: Generate Embeddings
        run: python -m agents.embedding_agent.embedding_agent

      - name: Semantic Deduplication
        run: python -m agents.semantic_deduplicator.semantic_deduplicator

      # =========================
      # ANALYSIS & CLUSTERING
      # =========================
      - name: Idea Clustering & Market Analysis
        run: |
          python -m agents.idea_clusterer.clusterer
          python -m agents.market_analyzer.analyzer

      - name: Opportunity Discovery & Gap Detection
        run: |
          python -m agents.opportunity_discovery.vector_discovery
          python -m agents.opportunity_gap_detector.gap_detector

      # =========================
      # SCORING & RANKING
      # =========================
      - name: Score & Rank Opportunities
        run: |
          python -m agents.opportunity_scorer.scorer
          python -m agents.opportunity_ranker.ranker

      # =========================
      # FINAL GENERATION
      # =========================
      - name: Generate Startup Blueprint
        run: python -m agents.startup_generator.startup_blueprint_generator

      - name: Analyze Momentum & Write Report
        run: |
          python -m agents.trend_momentum.momentum
          python -m agents.idea_writer.writer

      - name: Pipeline finished
        run: echo "AI Startup Factory production pipeline completed successfully"
