name: AI Startup Factory Pipeline

on:

  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"


jobs:

  run-pipeline:

    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      AI_STARTUP_TOKEN: ${{ secrets.AI_STARTUP_TOKEN }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Install dependencies
        run: |
          pip install requests


      # -------------------------
      # SCRAPER AGENT
      # -------------------------

      - name: Run Scraper
        run: |
          python agents/scraper.py


      # -------------------------
      # WRITER AGENT
      # -------------------------

      - name: Run Idea Writer
        run: |
          python agents/writer.py


      # -------------------------
      # MOMENTUM AGENT
      # -------------------------

      - name: Run Momentum Analyzer
        run: |
          python agents/momentum.py


      # -------------------------
      # SCORING AGENT
      # -------------------------

      - name: Run Opportunity Scorer
        run: |
          python agents/scorer.py
