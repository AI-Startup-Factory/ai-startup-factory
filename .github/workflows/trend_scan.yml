name: Trend Scanner

on:
  schedule:
    - cron: "0 */6 * * *"

  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repo
        uses: actions/checkout@v3

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: install dependencies
        run: pip install -r requirements.txt

      - name: run scanner
        run: python agents/trend_scanner/scanner.py
