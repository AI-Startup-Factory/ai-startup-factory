name: AI Startup Factory Debug Pipeline

on:
  workflow_dispatch: # Hanya dijalankan manual untuk testing/audit

jobs:
  debug-pipeline:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      AI_STARTUP_TOKEN: ${{ secrets.AI_STARTUP_TOKEN }}

    steps:
      # -------------------------------------------------
      # 1. INTEGRITY CHECK
      # -------------------------------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint & Syntax Check
        run: |
          echo "===== STARTING SYNTAX AUDIT ====="
          python -m compileall core agents
          echo "✅ All Python files are syntactically valid."

      # -------------------------------------------------
      # 2. DATA LAYER DEBUGGING
      # -------------------------------------------------
      - name: Test Trend Scanning & Ingestion
        run: |
          echo "🔍 Testing Core Ingestion..."
          python -m agents.trend_scanner.scanner
        # Kita tidak meng-hardcode data_sources di sini agar tetap modular

      # -------------------------------------------------
      # 3. AI & LOGIC DEBUGGING
      # -------------------------------------------------
      - name: Test Idea Engine
        run: |
          python -m agents.idea_generator.generator
          python -m agents.problem_extractor.extractor

      - name: Test Vector & Intelligence Layer
        run: |
          python -m agents.embedding_agent.embedding_agent
          python -m agents.semantic_deduplicator.semantic_deduplicator

      - name: Test Discovery & Analysis
        run: |
          python -m agents.clusterer.clusterer
          python -m agents.market_analyzer.analyzer
          python -m agents.opportunity_discovery.vector_discovery

      # -------------------------------------------------
      # 4. SCORING & PRODUCTION DEBUGGING
      # -------------------------------------------------
      - name: Test Ranking & Blueprint Gen
        run: |
          python -m agents.opportunity_gap_detector.gap_detector
          python -m agents.opportunity_scorer.scorer
          python -m agents.opportunity_ranker.ranker
          python -m agents.startup_generator.startup_blueprint_generator

      - name: Test Web & Momentum
        run: |
          python -m agents.trend_momentum.momentum
          python -m agents.web_generator.landing_page_gen

      # -------------------------------------------------
      # 5. DIAGNOSTICS
      # -------------------------------------------------
      - name: Environment Diagnostics
        run: |
          echo "===== PIPELINE DIAGNOSTICS ====="
          echo "Python version: $(python --version)"
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "Checking Supabase connection..."
          curl -s -o /dev/null -w "%{http_code}" "$SUPABASE_URL/rest/v1/" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY"
          echo " - Database ping (200/404 is good, 000 is bad)"
