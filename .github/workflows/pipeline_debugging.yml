name: AI Startup Factory Debug Pipeline

on:
  workflow_dispatch:

jobs:
  debug-pipeline:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # CHECKOUT REPOSITORY
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4


      # =========================
      # SETUP PYTHON
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      # =========================
      # INSTALL DEPENDENCIES
      # =========================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt


      # =========================
      # DEBUG: SHOW REPO STRUCTURE
      # =========================
      - name: Debug repository structure
        run: |
          echo "===== REPOSITORY STRUCTURE ====="
          ls -R


      # =========================
      # DEBUG: PYTHON SYNTAX CHECK
      # =========================
      - name: Debug python syntax
        run: |
          echo "===== PYTHON SYNTAX CHECK ====="
          python -m compileall agents


      # =========================
      # DEBUG: VERIFY ENV VARIABLES
      # =========================
      - name: Debug environment variables
        run: |
          echo "Checking environment variables..."

          echo "SUPABASE_URL:"
          if [ -z "$SUPABASE_URL" ]; then echo "MISSING"; else echo "OK"; fi

          echo "SUPABASE_ANON_KEY:"
          if [ -z "$SUPABASE_ANON_KEY" ]; then echo "MISSING"; else echo "OK"; fi

          echo "OPENROUTER_API_KEY:"
          if [ -z "$OPENROUTER_API_KEY" ]; then echo "MISSING"; else echo "OK"; fi

          echo "AI_STARTUP_TOKEN:"
          if [ -z "$AI_STARTUP_TOKEN" ]; then echo "MISSING"; else echo "OK"; fi

        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AI_STARTUP_TOKEN: ${{ secrets.AI_STARTUP_TOKEN }}


      # =========================
      # DATA SOURCE AGENTS
      # =========================

      - name: Run reddit startups
        run: python agents/data_sources/reddit_startups.py
        env: &envvars
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AI_STARTUP_TOKEN: ${{ secrets.AI_STARTUP_TOKEN }}

      - name: Run reddit ml
        run: python agents/data_sources/reddit_ml.py
        env: *envvars

      - name: Run reddit saas
        run: python agents/data_sources/reddit_saas.py
        env: *envvars

      - name: Run github trending
        run: python agents/data_sources/github_trending.py
        env: *envvars

      - name: Run github issues
        run: python agents/data_sources/github_issues.py
        env: *envvars

      - name: Run hackernews
        run: python agents/data_sources/hackernews.py
        env: *envvars

      - name: Run techcrunch
        run: python agents/data_sources/techcrunch.py
        env: *envvars

      - name: Run producthunt
        run: python agents/data_sources/producthunt.py
        env: *envvars

      - name: Run devto
        run: python agents/data_sources/devto.py
        env: *envvars

      - name: Run arxiv ai
        run: python agents/data_sources/arxiv_ai.py
        env: *envvars

      - name: Run arxiv ml
        run: python agents/data_sources/arxiv_ml.py
        env: *envvars

      - name: Run stackoverflow
        run: python agents/data_sources/stackoverflow.py
        env: *envvars

      - name: Run yc requests
        run: python agents/data_sources/yc_requests.py
        env: *envvars


      # =========================
      # TREND SCANNER
      # =========================
      - name: Run trend scanner
        run: python agents/trend_scanner/scanner.py
        env: *envvars


      # =========================
      # IDEA GENERATOR
      # =========================
      - name: Run idea generator
        run: python agents/idea_generator/generator.py
        env: *envvars


      # =========================
      # PROBLEM EXTRACTION
      # =========================
      - name: Run problem extractor
        run: python agents/problem_extractor/extractor.py
        env: *envvars


      # =========================
      # EMBEDDING
      # =========================
      - name: Run embedding agent
        run: python agents/embedding_agent/embedding_agent.py
        env: *envvars


      # =========================
      # SEMANTIC DEDUPLICATION
      # =========================
      - name: Run semantic deduplicator
        run: python agents/semantic_deduplicator/semantic_deduplicator.py
        env: *envvars


      # =========================
      # CLUSTERING
      # =========================
      - name: Run idea clusterer
        run: python agents/idea_clusterer/clusterer.py
        env: *envvars


      # =========================
      # MARKET ANALYSIS
      # =========================
      - name: Run market analyzer
        run: python agents/market_analyzer/analyzer.py
        env: *envvars


      # =========================
      # VECTOR OPPORTUNITY DISCOVERY
      # =========================
      - name: Run vector opportunity discovery
        run: python agents/opportunity_discovery/vector_discovery.py
        env: *envvars


      # =========================
      # OPPORTUNITY GAP DETECTOR
      # =========================
      - name: Run opportunity gap detector
        run: python agents/opportunity_gap_detector/gap_detector.py
        env: *envvars


      # =========================
      # OPPORTUNITY SCORER
      # =========================
      - name: Run opportunity scorer
        run: python agents/opportunity_scorer/scorer.py
        env: *envvars


      # =========================
      # OPPORTUNITY RANKER
      # =========================
      - name: Run opportunity ranker
        run: python agents/opportunity_ranker/ranker.py
        env: *envvars


      # =========================
      # STARTUP GENERATOR
      # =========================
      - name: Run startup blueprint generator
        run: python agents/startup_generator/startup_blueprint_generator.py
        env: *envvars


      # =========================
      # MOMENTUM
      # =========================
      - name: Run trend momentum
        run: python agents/trend_momentum/momentum.py
        env: *envvars


      # =========================
      # WRITER
      # =========================
      - name: Run writer
        run: python agents/idea_writer/writer.py
        env: *envvars


      # =========================
      # FINISH
      # =========================
      - name: Debug pipeline finished
        run: echo "Debug pipeline completed successfully"
