name: AI Startup Factory Debug Pipeline

on:
  workflow_dispatch:

jobs:
  debug-pipeline:
    runs-on: ubuntu-latest

    # Global Environment: Mengatur context sekali untuk semua steps
    env:
      PYTHONPATH: ${{ github.workspace }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      AI_STARTUP_TOKEN: ${{ secrets.AI_STARTUP_TOKEN }}

    steps:
      # =========================
      # PREPARATION
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Debug python syntax
        run: |
          echo "===== PYTHON SYNTAX CHECK ====="
          python -m compileall agents

      # =========================
      # DATA SOURCE AGENTS
      # =========================
      - name: Run Data Source Agents
        run: |
          python -m agents.data_sources.reddit_startups
          python -m agents.data_sources.reddit_ml
          python -m agents.data_sources.reddit_saas
          python -m agents.data_sources.github_trending
          python -m agents.data_sources.github_issues
          python -m agents.data_sources.hackernews
          python -m agents.data_sources.techcrunch
          python -m agents.data_sources.producthunt
          python -m agents.data_sources.devto
          python -m agents.data_sources.arxiv_ai
          python -m agents.data_sources.arxiv_ml
          python -m agents.data_sources.stackoverflow
          python -m agents.data_sources.yc_requests

      # =========================
      # PROCESSING PIPELINE
      # =========================
      - name: Run Trend & Idea Processing
        run: |
          python -m agents.trend_scanner.scanner
          python -m agents.idea_generator.generator
          python -m agents.problem_extractor.extractor

      - name: Run Embedding & Deduplication
        run: |
          python -m agents.embedding_agent.embedding_agent
          python -m agents.semantic_deduplicator.semantic_deduplicator

      - name: Run Clustering & Market Analysis
        run: |
          python -m agents.idea_clusterer.clusterer
          python -m agents.market_analyzer.analyzer

      # =========================
      # OPPORTUNITY & STRATEGY
      # =========================
      - name: Run Opportunity Discovery & Scoring
        run: |
          python -m agents.opportunity_discovery.vector_discovery
          python -m agents.opportunity_gap_detector.gap_detector
          python -m agents.opportunity_scorer.scorer
          python -m agents.opportunity_ranker.ranker

      - name: Run Startup Generation & Momentum
        run: |
          python -m agents.startup_generator.startup_blueprint_generator
          python -m agents.trend_momentum.momentum
          python -m agents.idea_writer.writer

      - name: Debug pipeline finished
        run: echo "Debug pipeline completed successfully"
