name: Manual Landing Page Generator

on:
  workflow_dispatch: # Memungkinkan eksekusi manual melalui tombol "Run workflow" di GitHub Actions

jobs:
  build-landing-page:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Mempercepat run berikutnya dengan caching

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Landing Page Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        # Memastikan script dijalankan sebagai modul sesuai struktur folder Anda
        run: python -m agents.web_generator.landing_page_gen

      - name: Upload Landing Pages as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: top-5-landing-pages
          path: dist/
          retention-days: 7
          if-no-files-found: error # Memberikan peringatan jika folder dist kosong
